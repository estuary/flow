# A string used to distinguish different Supabase projects on the same host.
# Per-stack: resolved from FLOW_SUPABASE_PROJECT_ID (the stack name) by the
# supabase CLI's env() substitution.
# These env() refs are ambient via mise (mise/tasks/local/stack-env); an unset or
# non-numeric port is a hard parse error (fail-loud), not a silent default.
project_id = "env(FLOW_SUPABASE_PROJECT_ID)"

[api]
# Port to use for the API URL.
port = "env(FLOW_PORT_SUPABASE_API)"
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints.
schemas = ["public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = "env(FLOW_PORT_SUPABASE_DB)"
# The database major version to use. This has to be the same as your remote database's. Run `SHOW
# server_version;` on the remote database to check.
major_version = 15

[studio]
# Port to use for Supabase Studio.
port = "env(FLOW_PORT_SUPABASE_STUDIO)"

# Email testing server. Emails sent with the local dev setup are not actually sent - rather, they
# are monitored, and you can view the emails that would have been sent from the web interface.
[inbucket]
# Port to use for the email testing server web interface.
port = "env(FLOW_PORT_SUPABASE_MAILPIT)"

[auth]
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "env(FLOW_SITE_URL)"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
# env() does not work inside TOML arrays (supabase/cli#2774), so this stays static;
# it only matters for OAuth redirects, which are unused locally.
additional_redirect_urls = ["https://localhost:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 seconds (one
# week).
# We set this to the max value for running locally, just because it's annoying to keep refreshing
# the token with the CLI
jwt_expiry = 604800
# Allow/disallow new user signups to your project.
enable_signup = true

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = false

# Use an external OAuth provider. The full list of providers are: `apple`, `azure`, `bitbucket`,
# `discord`, `facebook`, `github`, `gitlab`, `google`, `twitch`, `twitter`, `slack`, `spotify`.
[auth.external.google]
enabled = false
client_id = ""
secret = ""

[storage]
# The storage backend is used for storing large objects like images and videos.
enabled = false

[realtime]
# Realtime is used for subscribing to changes in your database.
enabled = false

[analytics]
# Analytics is used for tracking usage and performance metrics.
enabled = false
