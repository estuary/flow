import:
  - ../../../ops-catalog/data-plane-template.flow.yaml

collections:
  example/collection:
    schema:
      type: object
      properties:
        a_key: { type: string }
        a_val: { type: [integer, "null"] }
        a_bool: { type: boolean }
        a_str: { type: string }
      required: [a_key, a_bool, a_str]
    key: [/a_key]
    projections:
      a_bool:
        location: /a_bool
        partition: true
      a_str:
        location: /a_str
        partition: true
    journals:
      fragments:
        flushInterval: 15m
