[package]
name = "derive"
version = "0.0.0"
authors = ["Estuary Technologies, Inc"]
edition = "2018"

[dependencies]
catalog = { path = "../catalog", version = "0.0.0" }
doc = { path = "../doc", version = "0.0.0" }
json = { path = "../json", version = "0.0.0" }
protocol = { path = "../protocol", version = "0.0.0" }
tuple = { path = "../tuple", version = "0.0.0" }

bytes = "*"
futures = "*"
http = "*"
hyper = "0.14"
hyper-tls = "0.5"
hyperlocal = "0.8"
itertools = "*"
log = "*"
mime = "*"
pin-utils = "*"
prost = "0.7"
rocksdb = { version = "*", default-features = false }
rusqlite = { version = "*", features = ["bundled", "collation", "column_decltype", "functions", "serde_json", "url"] }
serde = { version = "*", features = ["derive"] }
serde_json = { version =  "*"}
thiserror = "*"
tokio = { version = "1", features = ["full"] }
tracing = "*"
tracing-futures = "*"
tracing-subscriber = "*"
url = "*"
uuid = "*"

[dev-dependencies]
serve = { path = "../serve", version = "0.0.0" }

insta = "*"
tempfile = "*"
tower = "*"
