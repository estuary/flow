# Soak-test catalog exercising the V2 runtime end to end (see README.md).
#
# The full chain is capture -> events/{alpha,beta,gamma} -> accounts derivation ->
# {views, ledger} materializations, every task carrying `enable-runtime-v2: "true"`
# so the whole pipeline runs on runtime-next. The pipeline is split across
# sub-directories so each task can be fed to `flowctl raw preview-next` on its own,
# building only what that task needs:
#
#   capture/flow.yaml                 test/soak/source    -> events/{alpha,beta,gamma}
#   derivation/flow.yaml              test/soak/accounts     (reads events/*)
#   materialization/views.flow.yaml   test/soak/views        (materialize-postgres)
#   materialization/ledger.flow.yaml  test/soak/ledger       (local: materialize-soak)
#
# Each file imports only the upstream specs it sources from, so previewing the
# capture pulls in no Docker image, and previewing the ledger pulls in the
# derivation but not the PostgreSQL `views`. This top-level catalog imports all of
# them, for a single-shot publish of the whole chain.
import:
  - capture/flow.yaml
  - derivation/flow.yaml
  - materialization/flow.yaml
