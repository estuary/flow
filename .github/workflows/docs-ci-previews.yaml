# .github/workflows/preview.yml
name: "docs.estuary.dev: Deploy PR previews"

on:
  pull_request:
    paths:
      - site/**
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./site/package-lock.json
      - name: Install dependencies
        working-directory: ./site
        run: npm ci
      - name: Build `docs.estuary.dev`
        working-directory: ./site
        env:
          BASE_URL: /pr-preview/pr-${{ github.event.number }}
        run: npm run build
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/build/
      - name: Comment with changed pages
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const prNum = context.issue.number;
            const base = `https://docs.estuary.dev/pr-preview/pr-${prNum}`;

            // Fetch master for diffing (checkout is shallow by default)
            execSync('git fetch origin master --depth=1');

            const files = execSync('git diff --name-only origin/master -- site/docs/')
              .toString().trim().split('\n')
              .filter(f => /\.(md|mdx)$/.test(f))
              .slice(0, 5);

            if (files.length === 0) return;

            const links = files.map(f => {
              let slug;
              try {
                const content = fs.readFileSync(f, 'utf8');
                const match = content.match(/^slug:\s*(.+)$/m);
                if (match) {
                  slug = match[1].trim();
                }
              } catch (e) {
                // File may have been deleted
              }
              if (!slug) {
                slug = '/' + f
                  .replace('site/docs/', '')
                  .replace(/\/README\.mdx?$/, '/')
                  .replace(/\.mdx?$/, '/');
              }
              if (!slug.startsWith('/')) slug = '/' + slug;
              return `- [${slug}](${base}${slug})`;
            });

            const total = execSync('git diff --name-only origin/master -- site/docs/ | grep -cE "\\.(md|mdx)$"')
              .toString().trim();
            const suffix = total > 5 ? `\n- ... and ${total - 5} more` : '';
            const pagesBlock = `\n\n📄 **Changed pages:**\n${links.join('\n')}${suffix}`;

            // Find the PR Preview Action comment and append to it
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const previewComment = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('PR Preview Action')
            );

            if (previewComment) {
              // Strip any previous "Changed pages" block before appending
              const cleanBody = previewComment.body.replace(/\n\n📄 \*\*Changed pages:\*\*[\s\S]*$/, '');
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previewComment.id,
                body: cleanBody + pagesBlock,
              });
            } else {
              // Fallback: create a separate comment if preview comment not found
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body: `📄 **Changed pages:**\n${links.join('\n')}${suffix}`,
              });
            }
