syntax = "proto3";

package runtime;
option go_package = "github.com/estuary/flow/go/protocols/runtime";

import "broker/protocol/protocol.proto";
import "consumer/protocol/protocol.proto";
import "go/protocols/derive/derive.proto";
import "go/protocols/flow/flow.proto";
import "go/protocols/materialize/materialize.proto";
import "go/protocols/ops/ops.proto";
import "go/protocols/shuffle/shuffle.proto";
import "gogoproto/gogo.proto";

option (gogoproto.marshaler_all) = true;
option (gogoproto.protosizer_all) = true;
option (gogoproto.unmarshaler_all) = true;
option (gogoproto.goproto_getters_all) = false;

// Plane describes the type of data plane in which the runtime is operating.
enum Plane {
  // A public data-plane. Lowest level of trust due to its multi-tenancy.
  PUBLIC = 0;
  // A private data-plane. Higher level of trust due to its tenant isolation.
  PRIVATE = 1;
  // A local stack or CLI context. Highest level of trust as we're running
  // on a developer or user's machine, not a production context.
  LOCAL = 2;
}

message TaskServiceConfig {
  int32  log_file_fd            = 1;
  string task_name              = 2;
  string uds_path               = 3;
  string container_network      = 4;
  Plane  plane                  = 6;
  string data_plane_fqdn        = 7;
  bytes  data_plane_signing_key = 8;
  string control_api_endpoint   = 9;
  string availability_zone      = 10;
}

// ShuffleRequest is the request message of a Shuffle RPC.
// It's a description of a document shuffle,
// where a journal is read and each document is mapped into:
//   - An extracted, packed, and hashed composite key (a "shuffle key").
//   - A rotated Clock value (an "r-clock").
//
// The packed key and r-clock can then be compared to individual reader
// RangeSpec's.
//
// ShuffleRequest instances are keyed and compared on (`journal`, `replay`, `build_id`),
// in order to identify and group related reads. Note that `journal` has a metadata path
// segment which uniquely identifies its particular derivation transform
// or materialization binding. Reads with equivalent shuffles are placed into
// common "read rings" which consolidate their underlying journal reads.
message ShuffleRequest {
  // Journal to be shuffled.
  string journal = 1
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Journal" ];
  // Is this a reply of the journal's content? We separate ongoing vs replayed
  // reads of a journal's content into distinct rings.
  bool replay = 2;
  // Build ID of the task which requested this JournalShuffle.
  string build_id = 3;

  // Offset to begin reading the journal from.
  int64 offset = 4
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Offset" ];
  // Offset to stop reading the journal at, or zero if unbounded.
  int64 end_offset = 5
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Offset" ];
  // Ranges of responsibility which are unique to this reader,
  // against which document shuffle outcomes are matched to determine
  // read eligibility.
  flow.RangeSpec range = 6 [ (gogoproto.nullable) = false ];

  // Coordinator is the Shard ID which is responsible for reads of this journal.
  string coordinator = 7
  [ (gogoproto.casttype) = "go.gazette.dev/core/consumer/protocol.ShardID" ];
  // Resolution header of the |shuffle.coordinator| shard.
  protocol.Header resolution = 8;

  // Index of the derivation transform or materialization
  // binding on whose behalf we're reading.
  uint32 shuffle_index = 9;
  // Derivation which is requesting the shuffle.
  flow.CollectionSpec derivation = 10;
  // Materialization which is requesting the shuffle.
  flow.MaterializationSpec materialization = 11;
}

// ShuffleResponse is the streamed response message of a Shuffle RPC.
message ShuffleResponse {
  // Status of the Shuffle RPC.
  consumer.Status status = 1;
  // Header of the response.
  protocol.Header header = 2;
  // Terminal error encountered while serving this ShuffleRequest. A terminal
  // error is only sent if a future ShuffleRequest of this same configuration
  // and offset will fail in the exact same way, and operator intervention is
  // required to properly recover. Such errors are returned so that the caller
  // can also abort with a useful, contextual error message.
  //
  // Examples of terminal errors include the requested journal not existing,
  // or data corruption. Errors *not* returned as |terminal_error| include
  // network errors, process failures, and other conditions which can be
  // retried.
  string terminal_error = 3;
  // Offset which was read through to produce this ShuffleResponse.
  int64 read_through = 4
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Offset" ];
  // WriteHead of the journal as reported by the broker, as of the creation of
  // this ShuffleResponse.
  int64 write_head = 5
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Offset" ];
  // Memory arena of this message.
  bytes arena = 6 [ (gogoproto.casttype) = "github.com/estuary/flow/go/protocols/flow.Arena" ];
  // Shuffled documents, each encoded in the 'application/json'
  // media-type.
  repeated flow.Slice docs = 7 [ (gogoproto.nullable) = false ];
  // The journal offsets of each document within the requested journal.
  // For a document at index i, its offsets are [ offsets[2*i], offsets[2*i+1]
  // ).
  repeated int64 offsets = 8
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Offset" ];
  // UUIDParts of each document.
  repeated flow.UUIDParts uuid_parts = 9 [ (gogoproto.nullable) = false ];
  // Packed, embedded encoding of the shuffle key into a byte string.
  // If the Shuffle specified a Hash to use, it's applied as well.
  repeated flow.Slice packed_key = 10 [ (gogoproto.nullable) = false ];
}

service Shuffler {
  rpc Shuffle(ShuffleRequest) returns (stream ShuffleResponse);
}

message RocksDBDescriptor {
  // Instrumented RocksDB environment which should be opened.
  fixed64 rocksdb_env_memptr = 1;
  // Path to the RocksDB directory to be opened.
  string rocksdb_path = 2;
}

// Container is a description of a running connector container.
message Container {
  // IP Address of the running container.
  // If this IP is accessible (it may not be, in contexts like Docker Desktop for Mac),
  // then it is *only* accessible from the hosting server.
  string ip_addr = 1;
  // Network ports which are available for this container.
  repeated flow.NetworkPort network_ports = 2;
  // Mapping of ports from `network_ports` to a corresponding "host-ip:port" address,
  // as either IPv4 or IPv6, through which the port can be accessed. If empty,
  // then the container `ip_addr` should be used directly.
  map<uint32, string> mapped_host_ports = 3;

  // The usage rate of a container is the number of connector credits per second that
  // are consumed by the connector.
  float usage_rate = 4;
}

message CaptureRequestExt {
  // Log.Level of this Request.
  ops.Log.Level log_level = 1;
  // RocksDB descriptor which should be opened. Sent (only) with the first Request.
  RocksDBDescriptor rocksdb_descriptor = 2;

  message StartCommit {
    // Flow runtime checkpoint associated with this transaction.
    consumer.Checkpoint runtime_checkpoint = 1;
  }
  StartCommit start_commit = 3;
}

message CaptureResponseExt {
  Container container = 1;

  message Opened {
    consumer.Checkpoint runtime_checkpoint = 1;
  }
  Opened opened = 2;

  message Captured {
    // Packed key extracted from the captured document.
    bytes key_packed = 1;
    // Packed partition values extracted from the captured document.
    bytes partitions_packed = 2;
  }
  Captured captured = 3;

  enum PollResult {
    INVALID = 0;
    // The poll succeeded and a transaction will be drained.
    READY = 1;
    // The connector is running but has produced no data.
    NOT_READY = 2;
    // The connector has exited, but cannot be restarted yet.
    COOL_OFF = 3;
    // The connector has exited and new session should be started.
    RESTART = 4;
  }

  message Checkpoint {
    ops.Stats  stats       = 1;
    PollResult poll_result = 2;
  }
  Checkpoint checkpoint = 4;
}

message DeriveRequestExt {
  // Log.Level of this Request.
  ops.Log.Level log_level = 1;
  // RocksDB descriptor which should be opened. Sent (only) with the first Request.
  // Ommitted if this is a SQLite derivation.
  RocksDBDescriptor rocksdb_descriptor = 2;

  message Open {
    // URL with a registered SQLite VFS which should be opened.
    string sqlite_vfs_uri = 1;
  }
  Open open = 3;
}

message DeriveResponseExt {
  Container container = 1;

  message Opened {
    consumer.Checkpoint runtime_checkpoint = 1;
  }
  Opened opened = 2;

  message Published {
    // Maximum UUID Clock of sourced document clocks which lead to this published document.
    fixed64 max_clock = 1;
    // Packed key extracted from the published document.
    bytes key_packed = 2;
    // Packed partition values extracted from the published document.
    bytes partitions_packed = 3;
  }
  Published published = 3;

  message Flushed {
    ops.Stats stats = 1;
  }
  Flushed flushed = 4;
}

message MaterializeRequestExt {
  // Log.Level of this Request.
  ops.Log.Level log_level = 1;
  // RocksDB descriptor which should be opened. Sent (only) with the first Request.
  RocksDBDescriptor rocksdb_descriptor = 2;
}

message MaterializeResponseExt {
  Container container = 1;

  message Flushed {
    ops.Stats stats = 1;
  }
  Flushed flushed = 2;
}

message CombineRequest {
  message Open {
    message Binding {
      // Perform full reduction (true), or only associative combines (false)?
      bool full = 1;
      // Composite key to combine over, as JSON-Pointers.
      repeated string key = 2;
      // Projections of the collection, which must include all `key` and `values` pointers.
      repeated flow.Projection projections = 3 [ (gogoproto.nullable) = false ];
      // Collection JSON-Schema to reduce over.
      bytes schema_json = 4 [(gogoproto.casttype) = "encoding/json.RawMessage"];
      // Optional SerPolicy to use for extracted fields and the document.
      flow.SerPolicy ser_policy = 5;
      // JSON pointer at which a UUID placeholder should be added on drain.
      // Leave empty to disable.
      string uuid_ptr = 6;
      // Values to extract and return.
      repeated string values = 7;
    };
    repeated Binding bindings = 1;
  };
  Open open = 1;

  message Add {
    // Binding of the added document.
    uint32 binding = 1;
    // Document to add to the combiner.
    bytes doc_json = 2 [(gogoproto.casttype) = "encoding/json.RawMessage"];
    // Add document to the front (true), or back (false) of the combiner?
    bool front = 3;
  };
  Add add = 2;
}

message CombineResponse {
  // Binding of this document.
  uint32 binding = 1;
  // Is this document marked as deleted?
  bool deleted = 2;
  // Full JSON document.
  bytes doc_json = 3 [(gogoproto.casttype) = "encoding/json.RawMessage"];
  // Was this document at the front, or back of the combiner?
  bool front = 4;
  // Packed key extracted from the captured document.
  bytes key_packed = 5;
  // Packed values extracted from the captured document.
  bytes values_packed = 6;
}

service Combiner {
  rpc Combine(stream CombineRequest) returns (stream CombineResponse);
}

message ConnectorProxyRequest {
  // No requests are sent by the client in a ProxyConnectors RPC. However:
  // * The client should leave its stream open while the proxy is in use.
  // * Then, it sends EOF to begin a graceful stop of the proxy.
  // * The response stream will EOF only after all logs have been yielded.
}

message ConnectorProxyResponse {
  // Address to dial for invoking connector RPCs.
  // Sent with the first response.
  string address = 1
  [ (gogoproto.casttype) = "go.gazette.dev/core/broker/protocol.Endpoint" ];

  // Proxy ID to be attached as metadata key "proxy-id" to connector RPCs.
  // Sent with the first response.
  string proxy_id = 2;

  // Log emitted by connectors invoked using `proxy_id`.
  // All messages following the first are logs.
  ops.Log log = 3;
}

service ConnectorProxy {
  rpc ProxyConnectors(stream ConnectorProxyRequest) returns (stream ConnectorProxyResponse);
}
// Convention note: this file uses L:Foo and C:Bar as short-hand to refer to
// messages of the Leader (L:) versus Connector (C:) protocol.
// Some message names are shared across protocols (e.g., Open),
// with related and intertwined semantics but differing representations.

// Leader coordinates multi-shard transactions for derivations and
// materializations. Shard instances dial the leader, which joins them
// and leads them in transaction life-cycles.
//
// Each RPC uses a single message type for both directions. The protocol is
// "inverted" compared to typical client-server: sometimes the shard initiates
// (Join, Recover, Flushed), sometimes the leader initiates (Read, Flush,
// Persist).
service Leader {
  // rpc Derive(stream .runtime.Derive) returns (stream .runtime.Derive);
  rpc Materialize(stream .runtime.Materialize) returns (stream .runtime.Materialize);
}

// Shard is the Go-facing bidirectional service exposed by runtime-next.
// It carries the same message types as Leader on the wire,
// but is a distinct service: it terminates parallel per-shard streams
// and (separately) dials the leader sidecar's Leader service, translating
// between the two and the connector RPC.
//
// Stream modes are determined by the first message:
//  - Session mode: first message is `Start`. Then any number of leader
//    sessions cycle through Join → ... → Stopped, terminated by
//    client (Go) EOF.
//  - Unary mode: first message is `spec` or `validate`. The leader is
//    not involved; the handler dials a transient connector and streams
//    the response back. A Validate may follow a Spec on the same stream.
service Shard {
  // rpc Derive(stream .runtime.Derive) returns (stream .runtime.Derive);
  rpc Materialize(stream .runtime.Materialize) returns (stream .runtime.Materialize);
}

// Join is sent by each shard to the leader at session start. The leader
// gathers all expected Joins, verifies `shards` are exactly equal,
// and responds with Joined on consensus or disagreement.
//
// Index 0 in `shards` is "shard zero": its reactor is co-located
// with the Shuffle Leader sidecar that owns this session, and it hosts
// the task's recovery log.
message Join {
  // Etcd mod revision at which `shards` was observed.
  // On disagreement all participants await the highest revision, then re-try.
  int64 etcd_mod_revision = 1;
  // Shard describes one shard and the reactor it is assigned to.
  //
  // Shards are ordered on ascending `shard.range.key_begin` and,
  // within a key range, on ascending `shard.range.r_clock_begin`. The
  // tiling must be complete and non-overlapping in 2D over
  // [key_begin, key_end] and [r_clock_begin, r_clock_end].
  message Shard {
    string id = 1;
    // Labeling that captures all shard metadata.
    ops.ShardLabeling labeling = 2;
    // Hosting reactor ID.
    protocol.ProcessSpec.ID reactor = 3;
    // Creation revision of the Etcd key representing the shard's
    // reactor assignment. Represents assignment identity:
    // each re-assignment has a unique, monotonic revision.
    int64 etcd_create_revision = 4;
  }
  // Current shard topology as observed by the sender.
  repeated Shard shards = 2;
  // This shard's index within `shards`.
  uint32 shard_index = 3;
  // Client-owned local directory where this shuffle Log segments should be written.
  string shuffle_directory = 4;
  // Dial-able gRPC endpoint for reaching this shard's shuffle service.
  string shuffle_endpoint = 5;
  // Dial-able gRPC endpoint for reaching the shuffle Leader's shuffle service.
  string leader_endpoint = 6;
}

// Joined is broadcast by the leader to all shards after collecting Joins.
message Joined {
  // Zero: consensus reached; the session proceeds.
  // Non-zero: topology disagreement. Await this revision, then retry.
  int64 max_etcd_revision = 1;
}

// Task which is being processed by the runtime.
// Sent from coordinator -> Shard, and from Shard zero (only) -> Leader after Joined.
message Task {
  // Task specification (protobuf-encoded bytes).
  bytes               spec              = 1;
  // Collection journal partition to which task states are written.
  string              ops_stats_journal = 2;
  // Collection to which task stats are written.
  flow.CollectionSpec ops_stats_spec    = 3;
  // When true, documents and stats are written to output and not directed to collections.
  bool                preview           = 4;
}

// Recover is sent by each shard to the leader after Joined,
// and carries state recovered from the shard's RocksDB.
// All shards send Recover, though it may be empty (e.g., non-zero shards).
message Recover {
  // Last-persisted ACK intents.
  map<string, bytes> ack_intents = 1;
  // Clock at which the last-committed transaction closed,
  // or zero if never committed.
  fixed64 committed_close_clock = 2;
  // Committed Frontier entries. Not a delta.
  shuffle.FrontierChunk committed_frontier = 3;
  // Persisted connector state.
  bytes connector_state_json = 4 [json_name = "connectorState"];
  // Clock at which the last hinted transaction closed, or zero if never hinted.
  // Iff ahead of `committed_close_clock` then the last transaction was hinted
  // but did not commit in the recovery log.
  //
  // Remote-Authoritative connectors may commit in the endpoint ahead of the
  // recovery log (during StartCommit/StartedCommit). We therefore store
  // `committed_close_clock` in checkpoints passed to StartCommit and compare
  // with `hinted_close_clock` on L:Opened to detect this case (and handle it
  // by treating the hinted Frontier as in-fact committed).
  //
  // If the same as `last_close_clock`, then the hinted transaction committed.
  // If this is ahead of `last_close_clock`, then a transaction was
  // hinted but did not commit.
  fixed64 hinted_close_clock = 5;
  // Persisted hinted Frontier entries (FH: range).
  shuffle.FrontierChunk hinted_frontier = 6;
  // Last-applied task specification (protobuf-encoded bytes), or empty.
  bytes last_applied = 7;
  // Legacy Checkpoint persisted in RocksDB for roll-forward / roll-back
  // capability with the legacy V1 runtime. This will be phased out as we fully
  // cut over to the `committed_frontier` representation.
  //
  // Note this is distinct from the checkpoint returned by C:Opened and
  // compared with `hinted_close_clock`, which will not be removed.
  consumer.Checkpoint legacy_checkpoint = 8;
  // Per-binding max-key entries.
  // Key: binding index; Value: packed composite key tuple.
  map<uint32, bytes> max_keys = 9;
  // Persisted trigger parameters (materialize only), or empty.
  bytes trigger_params_json = 10 [json_name = "triggerParams"];
}

// Persist is sent by the leader to shard zero when state must be durably
// written. Each field maps to a contractual WriteBatch effect on shard
// zero's RocksDB. Absent fields are inert.
//
// All fields of a Persist land together in a single WriteBatch.
// Its `nonce` is echoed back by the shard's Persisted response.
message Persist {
  // Nonce which is echoed back in the shard's `Persisted` response.
  uint64 nonce = 1;
  // Delete previously-persisted ACK intents. Applies ahead of `ack_intents`.
  // Effect: DeleteRange("AI:")
  bool delete_ack_intents = 2;
  // ACK intent entries.
  // Key: journal name; Value: raw journal content to write.
  // Effect: Put under "AI:{journal}".
  map<string, bytes> ack_intents = 3;
  // Clock at which the last-committed transaction closed.
  // Effect: Put under "committed-close-clock".
  fixed64 committed_close_clock = 4;
  // Committed Frontier entries.
  // Effect: Put under "FC:..." keys.
  shuffle.FrontierChunk committed_frontier = 5;
  // Connector state patches. State Update Wire Format.
  // Effect: Merge each patch under "connector-state".
  bytes connector_patches_json = 6 [json_name = "connectorPatches"];
  // Clock at which the hinted transaction closed.
  // Effect: Put under "hinted-close-clock".
  fixed64 hinted_close_clock = 7;
  // Delete a previously-persisted hinted frontier. Applies ahead of `hinted_frontier`.
  // Effect: DeleteRange("FH:")
  bool delete_hinted_frontier = 8;
  // Hinted Frontier entries.
  // Effect: Put under "FH:" keys.
  shuffle.FrontierChunk hinted_frontier = 9;
  // Last-applied task specification (protobuf-encoded bytes), or empty.
  // Effect: Put under "last-applied" key.
  bytes last_applied = 10;
  // Legacy checkpoint, required for rollback to legacy runtime.
  // Effect: Put under "checkpoint" key.
  consumer.Checkpoint legacy_checkpoint = 11;
  // Per-binding max-key updates, reduced to per-binding maximum across shards.
  // Key: binding index; Value: packed composite key tuple.
  // Effect: Put value under "MK-v2:{state_key}" (state_key resolved by the encoder).
  map<uint32, bytes> max_keys = 12;
  // Delete previously-persisted trigger parameters. Applies ahead of `trigger_params_json`.
  // Effect: Delete the "trigger-params" key.
  bool delete_trigger_params = 13;
  // Materialization trigger parameters.
  // Effect: Put under "trigger-params" key.
  bytes trigger_params_json = 14 [ json_name = "triggerParams" ];
}

// Persisted is sent by shard zero to the leader after the state is durable
// in the recovery log.
message Persisted {
  // Nonce which is echoed back from the leader's terminal `Persist` request.
  // The leader uses this to match responses to requests.
  uint64 nonce = 1;
}

message Apply {
  // Task specification to be applied (protobuf-encoded bytes).
  bytes spec = 1;
  // Version of the specification being applied.
  string version = 2;
  // Last specification which was successfully applied.
  bytes last_spec = 4;
  // Version of the last applied specification.
  string last_version = 5;
  // Last-persisted connector state from a previous session.
  bytes state_json = 6 [ json_name = "state" ];
}

message Applied {
  // Human-readable description of the action that the connector took.
  // If empty, this Apply is to be considered a "no-op".
  string action_description = 1;
  // Applied connector state patches. State Update Wire Format.
  bytes connector_patches_json = 2 [json_name = "connectorPatches"];
}

message Open {
  // Task specification to be opened (protobuf-encoded bytes).
  bytes spec = 1;
  // Version of the specification being opened.
  string version = 2;
  // Range of documents to be processed by this session.
  flow.RangeSpec range = 3;
  // Last-persisted connector checkpoint state from a previous session.
  bytes connector_state_json = 4 [ json_name = "state" ];
  // Materializations only: per-binding maximum keys.
  // Key: binding index; Value: packed composite key tuple.
  map<uint32, bytes> max_keys = 5;
}

// CloseNow is sent by controller, to shard, to leader, as a request to
// immediately close a transaction being held open by policy.
message CloseNow {}

// Stop is sent by controller, to shard, to leader to request graceful shutdown.
message Stop {}

// Stopped is sent by the leader to all shards confirming shutdown.
// The leader sends EOF after Stopped.
message Stopped {}

// SessionLoop is sent as the first message of a session-loop stream on the Shard
// service. It carries process-level configuration that outlives leader sessions,
// such as the the RocksDB context to use across leader sessions.
// The Leader service never sees SessionLoop.
message SessionLoop {
  // RocksDB context to be opened for this Shard stream.
  // Absent for non-zero materialize/derive shards, which don't host RocksDB.
  RocksDBDescriptor rocksdb_descriptor = 1;
}

// PartialAckIntent is a single shard's contribution to the transaction's
// ACK intents. The leader collects these from all shards and calls
// build_transaction_intents() to produce final ACK intent documents.
//
// Matches the return type of Publisher::commit_intents().
message PartialAckIntent {
  // Producer ID (only the low 6 bytes are used).
  fixed64 producer = 1;
  // Commit clock timestamp.
  fixed64 clock = 2;
  // Journals to which this producer appended CONTINUE_TXN documents.
  repeated string journals = 3;
}

// Materialize is the bidirectional message type for materialization sessions.
// Exactly one field is set per message.
message Materialize {

  // ----- UNARY REQUESTS -----

  // Go -> Shard. Unary request outside of a SessionLoop.
  materialize.Request.Spec spec = 1;
  // Shard -> Go. Connector's reply to `spec`.
  materialize.Response.Spec spec_response = 2;
  // Go -> Shard. Unary request outside of a SessionLoop.
  materialize.Request.Validate validate = 3;
  // Shard -> Go. Connector's reply to `validate`.
  materialize.Response.Validated validated = 4;

  // ----- STARTUP -----

  // Coordinator -> Shard. First message of a session-loop stream.
  SessionLoop session_loop = 20;

  // Coordinator -> Shard -> Leader. Session initiation with topology.
  Join join = 21;

  // Leader -> Shards -> Coordinators. Topology consensus or retry directive.
  Joined joined = 22;

  // Coordinator -> Shard, Shard zero (only) -> Leader.
  // Defines the task being processed by the now-joined topology.
  Task task = 23;

  // All Shards -> Leader. State recovered from RocksDB on startup.
  Recover recover = 24;

  // Leader -> Shard zero.
  Apply apply = 25;

  // Shard zero -> Leader. C:Apply complete.
  // If Applied emits state patches then Leader runs Persist / Persisted
  // and calls Apply again, until it emits no further state patches.
  Applied applied = 26;

  // Leader -> Shards. Open connector and prepare for transactions.
  Open open = 27;

  // Shard -> Leader and also Shard -> Coordinator.
  // Connector is running and session startup is complete.
  message Opened {
    // Description of the running connector container.
    Container container = 1;
    // Optional connector consumer.Checkpoint returned by C:Opened.
    //
    // Remote-authoritative connectors commit to their endpoint during
    // StartCommit, and we compare its embedded `committed_close_clock` with the
    // recovered `hinted_close_clock` to determine the commit status of the
    // hinted Frontier.
    //
    // Migration: if `committed_close_clock` is not present then the checkpoint
    // is assumed to be a V1 legacy checkpoint, and it replaces the recovered
    // committed Frontier. The V2 runtime may write additional checkpoint
    // keys for rollback compatibility with the V1 runtime.
    consumer.Checkpoint connector_checkpoint = 2;
  }
  Opened opened = 28;

  // ----- TRANSACTION PROCESSING -----

  // Leader -> Shards. Incremental Frontier to process into transaction.
  // Shards add source docs to their combiner and issue C:Load RPCs for
  // documents that may already exist in the endpoint.
  // Multiple Load messages may be sent per transaction.
  message Load {
    shuffle.FrontierChunk frontier = 1;
  }
  Load load = 40;

  // Shard -> Leader. Load complete.
  // All documents have been sent into the connector.
  message Loaded {
    // On-disk size of this shard's combiner, for transaction close policy.
    uint64 combiner_usage_bytes = 1;
    // Max-key deltas: new per-binding maximums observed during Load.
    // Key: binding index; Value: packed composite key tuple.
    map<uint32, bytes> max_key_deltas = 2;
    // Source DocsAndBytes read by this shard in this Load round.
    map<uint32, ops.Stats.DocsAndBytes> binding_read = 3;
    // Endpoint DocsAndBytes loaded by this shard in this Load round.
    map<uint32, ops.Stats.DocsAndBytes> binding_loaded = 4;
  }
  Loaded loaded = 41;

  // Leader -> Shards. Signals end of Load phase.
  message Flush {
    // Prior transaction's aggregated C:Acknowledged state patches.
    // State Update Wire Format.
    bytes connector_patches_json = 1 [json_name = "connectorPatches"];
  }
  Flush flush = 42;

  // Shard -> Leader. Flush phase complete.
  // Reports connector state patches and max-key deltas from C:Flushed.
  message Flushed {
    // Connector state patches from this shard's C:Flushed.
    // State Update Wire Format.
    bytes connector_patches_json = 1 [json_name = "connectorPatches"];
    // Endpoint DocsAndBytes loaded by this shard between last L:Loaded and C:Flushed
    map<uint32, ops.Stats.DocsAndBytes> binding_loaded = 2;
  }
  Flushed flushed = 43;

  // Leader -> Shards. Idempotency Persist now complete, drain combiners
  // into C:Store requests.
  message Store {}
  Store store = 44;

  // Shard -> Leader. Store phase complete, shard is ready to commit.
  // Reports final per-bindings transaction statistics.
  message Stored {
    map<uint32, ops.Stats.DocsAndBytes> binding_stored = 1;
    // Per-binding min source-document Clock observed by this shard in this
    // transaction. Only bindings that received documents are present. The
    // leader reduces (min across shards, then min across bindings) and
    // feeds the result into trigger parameters.
    map<uint32, fixed64> first_source_clock = 2;
    // Per-binding max source-document Clock observed by this shard in this
    // transaction. Only bindings that received documents are present.
    // Also used in trigger parameters.
    map<uint32, fixed64> last_source_clock = 3;
  }
  Stored stored = 45;

  // Leader -> Shards. Begin commit phase.
  // Distributes aggregated L:Flushed patches from all shards so each connector
  // instance can observe its peers' state for cooperative strategies (such as
  // parallel file staging).
  message StartCommit {
    // Aggregated Flushed connector state patches from all shards.
    // State Update Wire Format.
    bytes connector_patches_json = 1 [json_name = "connectorPatches"];
    // Transaction Checkpoint for remote-authoritative connectors.
    consumer.Checkpoint connector_checkpoint = 2;
  }
  StartCommit start_commit = 46;

  // Shard -> Leader. Commit initiated.
  // Remote-authoritative connectors will literally commit prior to return.
  message StartedCommit {
    // Connector state patches from this shard's C:StartedCommit.
    // State Update Wire Format.
    bytes connector_patches_json = 1 [json_name = "connectorPatches"];
  }
  StartedCommit started_commit = 47;

  // Leader -> Shards. Transaction complete.
  message Acknowledge {
    // Aggregated StartedCommit connector state patches from all shards.
    // State Update Wire Format.
    bytes connector_patches_json = 1 [json_name = "connectorPatches"];
  }
  Acknowledge acknowledge = 48;

  // Shard -> Leader. Reports C:Acknowledged state from prior transaction.
  // Sent by each shard after its connector responds to C:Acknowledge.
  message Acknowledged {
    // Connector state patches from this shard's C:Acknowledged.
    // State Update Wire Format.
    bytes connector_patches_json = 1 [json_name = "connectorPatches"];
  }
  Acknowledged acknowledged = 49;

  // Leader -> Shard zero. Durably persist state.
  Persist persist = 50;

  // Shard zero -> Leader. State is durable.
  Persisted persisted = 51;

  // Shard -> Leader. Request immediate close of a current transaction.
  CloseNow close_now = 52;

  // ----- TEARDOWN -----

  // Shard -> Leader. Graceful shutdown request.
  Stop stop = 60;
  // Leader -> Shards. Shutdown confirmed; EOF follows.
  Stopped stopped = 61;
}
